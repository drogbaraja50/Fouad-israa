<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffdae0; /* Soft Pink */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        #question {
            color: #d63384;
            font-size: 2.5rem;
            text-align: center;
            margin: 20px;
            min-height: 80px;
            z-index: 10;
        }

        .gif-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        #main-image {
            width: 300px; /* Bigger size */
            height: auto;
            border-radius: 20px;
        }

        .btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            padding: 20px;
            flex-wrap: wrap; /* Allows No button to move to next line if Yes gets too big */
        }

        button {
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease-out;
            white-space: nowrap;
        }

        #yesBtn {
            background-color: #ff4d94;
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
        }
    </style>
</head>
<body>

    <h1 id="question">Israa, do you love me? ❤️</h1>

    <div class="gif-container">
        <!-- Starting GIF: Cute waiting -->
        <img id="main-image" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute character">
    </div>
    
    <div class="btn-container" id="buttonArea">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const image = document.getElementById('main-image');
        const question = document.getElementById('question');

        let noCount = 0;
        let yesPaddingHeight = 15;
        let yesPaddingWidth = 30;
        let yesFontSize = 1.2;

        const sadGifs = [
            "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/vSkXT9AZdY63FidC0v/giphy.gif", // Sad
            "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/OPU6wEKPcElt6/giphy.gif", // Crying
            "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/7SF5scGB2AFrO/giphy.gif"  // Devastated
        ];

        const messages = [
            "Are you sure?? 🥺",
            "Please think again... 💔",
            "You're breaking my heart! 😭",
            "I'm not taking no for an answer!"
        ];

        noBtn.addEventListener('click', () => {
            noCount++;
            
            if (noCount <= 3) {
                // Change Message and Image
                question.innerText = messages[noCount - 1];
                image.src = sadGifs[noCount - 1];

                // Grow Yes button by changing layout properties (pushes No button away)
                yesPaddingHeight += 20;
                yesPaddingWidth += 40;
                yesFontSize += 0.5;
                
                yesBtn.style.padding = `${yesPaddingHeight}px ${yesPaddingWidth}px`;
                yesBtn.style.fontSize = `${yesFontSize}rem`;

                // Shrink No button
                noBtn.style.transform = `scale(${1 - (noCount * 0.15)})`;
            }

            if (noCount >= 3) {
                makeNoButtonRun();
            }
        });

        function makeNoButtonRun() {
            noBtn.style.position = 'fixed';
            moveNoButton();
            // Attach hover event once it starts running
            noBtn.addEventListener('mouseover', moveNoButton);
        }

        function moveNoButton() {
            // Calculate random position away from edges
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50) + 25;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50) + 25;
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        yesBtn.addEventListener('click', () => {
            question.innerText = "I knew it! I love you too! ❤️✨";
            // Final Happy Kissing/Cuddling GIF
            image.src = "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif";
            
            // Clean up
            noBtn.style.display = 'none';
            yesBtn.style.padding = "15px 30px";
            yesBtn.style.fontSize = "1.5rem";
        });
    </script>
</body>
</html>
