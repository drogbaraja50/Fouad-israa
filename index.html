<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        #main-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d63384;
            font-size: 1.5rem;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4d94;
            color: white;
            z-index: 10;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="main-image" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute character">
        <h1 id="question">Israa do you love me? ❤️</h1>
        
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const image = document.getElementById('main-image');
        const question = document.getElementById('question');

        let noCount = 0;
        let yesSize = 1;
        let noSize = 1;

        const messages = [
            "No",
            "Are you sure??",
            "Please think again...",
            "Think more Sarouaa! 🥺",
            "No more sushi if said No this time!",
        ];

        const sadImages = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/vSkXT9AZdY63FidC0v/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/OPU6wEKPcElt6/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/7SF5scGB2AFrO/giphy.gif"
        ];

        noBtn.addEventListener('click', () => {
            noCount++;
            
            // Update Text and Image
            if (noCount <= 3) {
                question.innerText = messages[noCount];
                image.src = sadImages[Math.min(noCount - 1, sadImages.length - 1)];
                
                // Scale buttons
                yesSize += 0.4;
                noSize -= 0.15;
                yesBtn.style.transform = `scale(${yesSize})`;
                noBtn.style.transform = `scale(${noSize})`;
            }

            // Start moving away after 3 clicks
            if (noCount >= 3) {
                moveButton();
            }
        });

        // Evasive logic for the No button
        noBtn.addEventListener('mouseover', () => {
            if (noCount >= 3) {
                moveButton();
            }
        });

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        yesBtn.addEventListener('click', () => {
            question.innerText = "Yay! I love you too! ❤️✨";
            image.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif";
            noBtn.style.display = 'none';
            yesBtn.style.transform = 'scale(1.2)';
        });
    </script>
</body>
</html>
