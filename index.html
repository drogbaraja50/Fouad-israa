<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffeef2; /* Soft Pink */
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        #content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #main-gif {
            width: 80%;
            max-width: 500px; /* Large GIF size */
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 100%;
            position: relative;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            z-index: 100; /* Ensure it stays on top as it grows */
        }

        #noBtn {
            background-color: #999;
            color: white;
            position: relative;
            z-index: 10;
        }

        /* Success screen layout */
        .success h1 {
            font-size: 3rem;
            color: #ff0054;
        }
    </style>
</head>
<body>

    <div id="content-wrapper">
        <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute character">
        <h1 id="question">Israa, do you love me? ❤️</h1>
        
        <div class="btn-container">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const gif = document.getElementById('main-gif');
        const question = document.getElementById('question');

        let noCount = 0;
        let yesScale = 1;
        let noScale = 1;

        // Sequence of sad GIFs for the male character
        const sadGifs = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/OPU6wEKPcElt6/giphy.gif", // Pout
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/7SF5scGB2AFrO/giphy.gif", // Crying
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/d2lcHJTG5Tscg/giphy.gif"  // Heartbroken
        ];

        const sadMessages = [
            "Are you sure Sarouaa? 🥺",
            "Please think about it again... 💔",
            "No more cuddles if you say No this time! 😤"
        ];

        noBtn.addEventListener('click', () => {
            if (noCount < 3) {
                noCount++;
                
                // Update text and GIF
                question.innerText = sadMessages[noCount - 1];
                gif.src = sadGifs[noCount - 1];

                // Scaling logic
                // By the 3rd click, yesScale will be huge
                yesScale += 2.5; 
                noScale -= 0.2;

                yesBtn.style.transform = `scale(${yesScale})`;
                noBtn.style.transform = `scale(${noScale})`;
            }

            if (noCount >= 3) {
                moveButton();
            }
        });

        // Evasive logic - button runs away starting at 3rd click
        noBtn.addEventListener('mouseover', () => {
            if (noCount >= 3) {
                moveButton();
            }
        });

        function moveButton() {
            // Randomly move button within the viewport
            const padding = 50;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        yesBtn.addEventListener('click', () => {
            // Success State
            question.innerText = "YAY! I knew it! I love you too! ❤️✨";
            // Cute kissing/cuddling GIF
            gif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp3Y3Zzbmpsbm45eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/v1.Y2lkPTc5MGI3NjExYzh6Z3Z4bmh6eHozbmR6eW56eHozbmR6eW56eHozbmR6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif"; 
            
            // Cleanup
            noBtn.style.display = 'none';
            yesBtn.style.transform = 'scale(1.5)';
            document.body.style.backgroundColor = '#ffc2d1';
        });
    </script>
</body>
</html>
